<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fort Explorers: Canada's Historic Forts</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
  :root{
    --navy:#1b3a5b; --gold:#f2b035; --red:#d64545; --green:#2f9e6f;
    --cream:#fdf6e9; --ink:#20303f;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;font-family:'Trebuchet MS','Segoe UI',system-ui,sans-serif;color:var(--ink);}
  body{background:var(--cream);}
  header{
    background:linear-gradient(135deg,#1b3a5b,#2c5a86);
    color:#fff;padding:14px 18px;display:flex;align-items:center;gap:14px;
    box-shadow:0 3px 0 var(--gold);position:relative;z-index:500;flex-wrap:wrap;
  }
  header .logo{font-size:2rem;}
  header h1{font-size:1.5rem;margin:0;letter-spacing:.5px;}
  header p{margin:0;font-size:.85rem;opacity:.9;width:100%;}
  #wrap{display:flex;height:calc(100vh - 92px);}
  #map{flex:1;height:100%;background:#a9d3e8;}
  .legend-tip{
    position:absolute;bottom:14px;left:14px;z-index:600;background:#fff;
    border:3px solid var(--navy);border-radius:14px;padding:8px 12px;font-size:.82rem;
    max-width:230px;box-shadow:0 4px 12px rgba(0,0,0,.18);
  }
  .legend-tip b{color:var(--navy);}
  /* Fort markers */
  .fort-pin{
    background:var(--red);width:38px;height:38px;border-radius:50% 50% 50% 0;
    transform:rotate(-45deg);border:3px solid #fff;box-shadow:0 3px 6px rgba(0,0,0,.4);
    display:flex;align-items:center;justify-content:center;cursor:pointer;
    transition:transform .15s;
  }
  .fort-pin span{transform:rotate(45deg);font-size:18px;}
  .fort-pin:hover{transform:rotate(-45deg) scale(1.15);}
  .leaflet-marker-icon .fort-pin{}
  /* Modal */
  #overlay{
    position:fixed;inset:0;background:rgba(20,30,45,.72);z-index:1000;
    display:none;align-items:center;justify-content:center;padding:14px;
  }
  #overlay.show{display:flex;}
  #card{
    background:var(--cream);width:min(760px,100%);max-height:92vh;overflow-y:auto;
    border-radius:22px;border:5px solid var(--gold);box-shadow:0 18px 50px rgba(0,0,0,.5);
    position:relative;
  }
  #closeBtn{
    position:sticky;top:10px;float:right;margin:10px 12px 0 0;z-index:5;
    background:var(--red);color:#fff;border:none;width:40px;height:40px;border-radius:50%;
    font-size:1.3rem;cursor:pointer;line-height:1;box-shadow:0 3px 6px rgba(0,0,0,.3);
  }
  #closeBtn:hover{background:#b83333;}
  .card-pad{padding:6px 26px 28px;}
  .fort-title{color:var(--navy);font-size:1.9rem;margin:.2em 0 .05em;}
  .fort-loc{color:var(--red);font-weight:bold;margin:0 0 12px;font-size:1rem;}
  .fort-loc .prov{background:var(--navy);color:#fff;border-radius:20px;padding:2px 10px;font-size:.8rem;margin-left:6px;}
  .banner{
    width:100%;height:150px;border-radius:16px;overflow:hidden;margin-bottom:10px;
    display:flex;align-items:center;justify-content:center;
    background:linear-gradient(135deg,#2c5a86,#87b7d8);
  }
  .gallery{display:flex;gap:8px;overflow-x:auto;padding-bottom:6px;margin-bottom:6px;min-height:4px;}
  .gallery img{
    height:120px;border-radius:12px;border:3px solid #fff;box-shadow:0 3px 8px rgba(0,0,0,.2);
    cursor:pointer;flex-shrink:0;object-fit:cover;
  }
  .photo-note{font-size:.72rem;color:#6b7a88;margin:0 0 12px;}
  .photo-note a{color:var(--navy);}
  .story{
    background:#fff;border-left:6px solid var(--green);border-radius:10px;
    padding:12px 16px;font-size:1.02rem;line-height:1.5;margin-bottom:16px;
  }
  .factchips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px;}
  .chip{background:#fff;border:2px solid var(--navy);border-radius:20px;padding:5px 12px;font-size:.82rem;}
  .chip b{color:var(--navy);}
  .bigbtn{
    display:block;width:100%;background:var(--gold);color:var(--ink);border:none;
    padding:16px;border-radius:16px;font-size:1.25rem;font-weight:bold;cursor:pointer;
    box-shadow:0 4px 0 #c98f1e;transition:transform .1s;
  }
  .bigbtn:hover{transform:translateY(-2px);}
  .bigbtn:active{transform:translateY(2px);box-shadow:0 1px 0 #c98f1e;}
  .bigbtn.green{background:var(--green);color:#fff;box-shadow:0 4px 0 #217a54;}
  .bigbtn.navy{background:var(--navy);color:#fff;box-shadow:0 4px 0 #10273e;}
  /* Quiz */
  .qhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
  .qcount{font-weight:bold;color:var(--navy);font-size:1rem;}
  .qscore{font-weight:bold;color:var(--green);}
  .progress{height:12px;background:#e3d9c4;border-radius:8px;overflow:hidden;margin-bottom:16px;}
  .progress .bar{height:100%;background:var(--green);width:0;transition:width .3s;}
  .question{font-size:1.3rem;color:var(--ink);margin:0 0 16px;line-height:1.4;font-weight:bold;}
  .answers{display:flex;flex-direction:column;gap:10px;}
  .ans{
    background:#fff;border:3px solid var(--navy);border-radius:14px;padding:14px 16px;
    font-size:1.08rem;text-align:left;cursor:pointer;transition:all .12s;
  }
  .ans:hover:not(.locked){background:#eef4fa;transform:translateX(4px);}
  .ans.correct{background:var(--green);color:#fff;border-color:var(--green);}
  .ans.wrong{background:var(--red);color:#fff;border-color:var(--red);}
  .ans.locked{cursor:default;}
  .feedback{margin:14px 0 4px;font-size:1.05rem;font-weight:bold;min-height:26px;}
  .feedback.good{color:var(--green);}
  .feedback.bad{color:var(--red);}
  .explain{background:#fff8e6;border-radius:10px;padding:10px 14px;font-size:.95rem;margin-bottom:14px;display:none;}
  /* Results */
  .result-emoji{font-size:4rem;text-align:center;margin:10px 0 0;}
  .result-title{text-align:center;color:var(--navy);font-size:2rem;margin:6px 0;}
  .result-score{text-align:center;font-size:1.4rem;margin-bottom:6px;}
  .result-msg{text-align:center;font-size:1.1rem;margin-bottom:20px;color:#42586b;}
  .badge{display:block;margin:0 auto 16px;width:130px;height:130px;}
  .btnrow{display:flex;gap:10px;flex-wrap:wrap;}
  .btnrow .bigbtn{flex:1;font-size:1.05rem;padding:14px;}
  /* Passport button in header */
  #passportBtn{
    margin-left:8px;background:var(--gold);color:var(--ink);border:none;border-radius:14px;
    padding:9px 14px;font-family:inherit;font-weight:bold;font-size:.95rem;cursor:pointer;
    display:flex;align-items:center;gap:8px;box-shadow:0 3px 0 #c98f1e;
  }
  #passportBtn:hover{transform:translateY(-1px);}
  #passportBtn .pcount{background:#fff;color:var(--navy);border-radius:10px;padding:1px 8px;}
  /* Read-aloud + fun fact + glossary */
  .toolrow{display:flex;gap:8px;margin:2px 0 12px;flex-wrap:wrap;}
  .toolbtn{background:#fff;border:2px solid var(--navy);color:var(--navy);border-radius:20px;
    padding:7px 13px;font-family:inherit;font-weight:bold;font-size:.85rem;cursor:pointer;}
  .toolbtn:hover{background:#eef4fa;}
  .toolbtn.on{background:var(--navy);color:#fff;}
  .factcard{background:#fff4d6;border:2px dashed var(--gold);border-radius:14px;padding:12px 16px;
    margin-bottom:14px;font-size:1rem;line-height:1.45;}
  .daily-role{background:#fff;border-left:5px solid var(--gold);border-radius:8px;padding:9px 13px;margin-bottom:8px;font-size:.95rem;line-height:1.45;}
  .daily-role b{color:var(--navy);}
  .factcard b{color:#b5820f;}
  .gloss{border-bottom:2px dotted var(--navy);color:var(--navy);font-weight:bold;cursor:help;}
  #glossBox{display:none;background:var(--navy);color:#fff;border-radius:12px;padding:10px 14px;
    margin:-4px 0 14px;font-size:.95rem;}
  #glossBox b{color:var(--gold);}
  .streak{display:inline-block;color:#e8730c;font-weight:bold;margin-left:8px;}
  /* Medals */
  .medal{font-size:1.1rem;}
  /* Passport modal */
  .pass-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;margin:6px 0 16px;}
  .pass-cell{background:#fff;border:3px solid #dfe7ee;border-radius:14px;padding:10px;text-align:center;position:relative;}
  .pass-cell.done{border-color:var(--green);}
  .pass-cell .stamp{position:absolute;top:6px;right:8px;font-size:1.1rem;}
  .pass-cell .pemoji{font-size:1.8rem;}
  .pass-cell .pname{font-size:.8rem;font-weight:bold;color:var(--navy);margin-top:3px;line-height:1.15;}
  .pass-cell .pmedal{font-size:1.2rem;min-height:1.3rem;}
  .pass-cell.locked{opacity:.6;}
  .pass-cell.partial{border-color:var(--gold);}
  .pass-cell .stamp{font-size:.95rem;font-weight:bold;color:var(--navy);}
  .pbar{height:8px;background:#e3e9ee;border-radius:5px;overflow:hidden;margin:5px 2px 3px;}
  .pbarfill{height:100%;background:var(--green);transition:width .3s;}
  .plevels{font-size:.82rem;margin-bottom:2px;}
  /* Certificate */
  #certWrap{padding:6px 26px 26px;}
  .cert{border:10px double var(--gold);border-radius:14px;padding:26px 22px;text-align:center;
    background:linear-gradient(135deg,#fffdf5,#fdf1d6);}
  .cert h2{color:var(--navy);font-size:1.8rem;margin:6px 0;}
  .cert .seal{font-size:3rem;}
  .cert .who{font-size:1.6rem;color:var(--red);font-weight:bold;border-bottom:2px solid var(--navy);
    display:inline-block;min-width:60%;padding:4px 10px;margin:8px 0;}
  .cert input{font-size:1.3rem;text-align:center;border:none;border-bottom:2px dashed var(--navy);
    background:transparent;font-family:inherit;color:var(--red);font-weight:bold;width:70%;}
  .cert .sub{color:#42586b;font-size:1rem;margin:6px 0;}
  @media(max-width:640px){
    #wrap{flex-direction:column;height:auto;}
    #map{height:56vh;}
    .fort-title{font-size:1.5rem;}
    .question{font-size:1.15rem;}
    header p{display:none;}
  }
  /* Difficulty level buttons */
  .levelrow{display:flex;gap:10px;flex-wrap:wrap;}
  .levelrow .bigbtn{flex:1;min-width:110px;font-size:1.1rem;padding:14px 8px;}
  /* Hard-mode timer bar */
  .timerbar{position:relative;height:20px;background:#e3d9c4;border-radius:10px;overflow:hidden;margin-bottom:14px;}
  .timerbar .tfill{height:100%;width:100%;background:linear-gradient(90deg,#2f9e6f,#f2b035,#d64545);transition:width 1s linear;}
  .timerbar .tnum{position:absolute;top:0;left:50%;transform:translateX(-50%);font-size:.8rem;font-weight:bold;color:#20303f;line-height:20px;}
  /* Games hub */
  #gamesBtn{margin-left:auto;background:#8ecae6;color:var(--navy);border:none;border-radius:14px;padding:9px 14px;
    font-family:inherit;font-weight:bold;font-size:.95rem;cursor:pointer;box-shadow:0 3px 0 #5fa8c9;}
  #gamesBtn:hover{transform:translateY(-1px);}
  .gamecard{background:#fff;border:3px solid var(--navy);border-radius:16px;padding:16px;text-align:left;
    cursor:pointer;font-family:inherit;box-shadow:0 3px 6px rgba(0,0,0,.12);transition:transform .1s;width:100%;}
  .gamecard:hover{transform:translateY(-3px);}
  .gamecard .gi{font-size:2rem;}
  .gamecard .gt{font-weight:bold;color:var(--navy);font-size:1.15rem;margin:4px 0 2px;}
  .gamecard .gd{color:#42586b;font-size:.88rem;}
  /* Timeline game */
  .tl-slots{display:flex;gap:6px;align-items:stretch;margin:8px 0 4px;overflow-x:auto;padding-bottom:4px;}
  .tl-slot{flex:1;min-width:92px;min-height:104px;border:3px dashed #b9c6d3;border-radius:12px;
    display:flex;flex-direction:column;align-items:center;justify-content:center;background:#fff;padding:4px;text-align:center;position:relative;}
  .tl-slot .num{position:absolute;top:2px;left:6px;font-size:.7rem;color:#8a99a7;font-weight:bold;}
  .tl-slot.filled{border-style:solid;border-color:var(--navy);cursor:pointer;}
  .tl-slot.right{border-color:var(--green);background:#eafaf1;}
  .tl-slot.wrong{border-color:var(--red);background:#fdecec;}
  .tl-tray{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin:10px 0;}
  .tl-card{background:#fff;border:3px solid var(--gold);border-radius:12px;padding:8px 6px;width:96px;text-align:center;cursor:pointer;box-shadow:0 2px 5px rgba(0,0,0,.12);transition:transform .1s;}
  .tl-card:hover{transform:translateY(-3px);}
  .tl-emoji{font-size:1.7rem;}
  .tl-name{font-size:.72rem;font-weight:bold;color:var(--navy);line-height:1.1;margin-top:3px;}
  .tl-year{font-size:.85rem;font-weight:bold;color:var(--red);}
  .arrowline{display:flex;justify-content:space-between;font-weight:bold;color:var(--navy);font-size:.85rem;margin:2px 4px;}
  /* Cannon game */
  #cannonScene{position:relative;height:200px;border-radius:14px;overflow:hidden;margin-bottom:12px;
    background:linear-gradient(#bfe6f5 60%,#7fc3e8 60%,#4a92c4);}
  .waves{position:absolute;bottom:0;left:0;right:0;height:40%;background:repeating-linear-gradient(90deg,#4a92c4,#4a92c4 12px,#5aa0cf 12px,#5aa0cf 24px);opacity:.5;}
  #fortIcon{position:absolute;left:8px;bottom:12px;font-size:2.6rem;z-index:2;}
  #cannonIcon{position:absolute;left:52px;bottom:16px;font-size:1.8rem;z-index:3;}
  #shipIcon{position:absolute;bottom:20px;font-size:2.4rem;z-index:2;transition:right .5s ease;}
  #ball{position:absolute;left:70px;bottom:40px;font-size:1.3rem;opacity:0;z-index:4;}
  .cannon-health{display:flex;justify-content:space-between;font-weight:bold;color:var(--navy);margin-bottom:6px;font-size:.9rem;}
  /* Dress-up game */
  .du-wrap{display:flex;gap:16px;flex-wrap:wrap;}
  .du-char{flex:1;min-width:150px;background:linear-gradient(#eaf3f9,#d5e6f1);border-radius:16px;border:3px solid var(--navy);
    display:flex;flex-direction:column;align-items:center;justify-content:center;padding:14px;min-height:220px;}
  .du-fig{font-size:0;line-height:1;text-align:center;}
  .du-fig div{font-size:3.2rem;line-height:1.05;}
  .du-controls{flex:2;min-width:220px;}
  .du-cat{margin-bottom:10px;}
  .du-cat h4{margin:0 0 5px;color:var(--navy);font-size:.95rem;}
  .du-opts{display:flex;gap:6px;flex-wrap:wrap;}
  .du-opt{background:#fff;border:2px solid #cdd8e2;border-radius:12px;padding:6px 9px;cursor:pointer;font-family:inherit;font-size:.8rem;display:flex;align-items:center;gap:5px;}
  .du-opt .oe{font-size:1.3rem;}
  .du-opt.sel{border-color:var(--gold);background:#fff7e3;}
  .du-opt.right{border-color:var(--green);background:#eafaf1;}
  .du-opt .oe{display:inline-flex;align-items:center;}
  .du-people{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px;margin:8px 0 14px;}
  .du-person{background:#eaf3f9;border:3px solid var(--navy);border-radius:16px;padding:10px;cursor:pointer;font-family:inherit;text-align:center;transition:transform .1s;}
  .du-person:hover{transform:translateY(-3px);}
  .du-compare{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;margin-bottom:12px;}
  .du-col{flex:1;min-width:150px;max-width:230px;text-align:center;}
  .du-collabel{font-weight:bold;color:var(--navy);margin-bottom:4px;}
  @media print{
    body *{visibility:hidden;}
    #certOverlay,#certOverlay *{visibility:visible;}
    #certOverlay{position:absolute;inset:0;display:block;background:#fff;padding:0;}
    #certOverlay .noprint{display:none;}
    #closeCert{display:none;}
  }
</style>
</head>
<body>
<header>
  <span class="logo">🏰</span>
  <div>
    <h1>Fort Explorers</h1>
  </div>
  <button id="gamesBtn" title="Play mini-games">🎮 Games</button>
  <button id="passportBtn" title="See your Explorer Passport">🎒 My Passport <span class="pcount"><span id="pcount">0</span>/12</span></button>
  <p>Tap a red pin to explore a real historic fort in Canada — see photos, hear the story, and play history quizzes and mini-games!</p>
</header>
<div id="wrap">
  <div id="map"></div>
</div>
<div class="legend-tip">🗺️ <b>How to play:</b> Click a <span style="color:#d64545;font-weight:bold;">red pin</span> on the map. Read the fort's story, look at the photos, then hit <b>Start Quiz</b>!</div>

<div id="overlay">
  <div id="card">
    <button id="closeBtn" aria-label="Close">✕</button>
    <div class="card-pad" id="cardBody"></div>
  </div>
</div>

<!-- Explorer Passport modal -->
<div id="passOverlay" style="position:fixed;inset:0;background:rgba(20,30,45,.72);z-index:1100;display:none;align-items:center;justify-content:center;padding:14px;">
  <div style="background:var(--cream);width:min(760px,100%);max-height:92vh;overflow-y:auto;border-radius:22px;border:5px solid var(--navy);box-shadow:0 18px 50px rgba(0,0,0,.5);">
    <button id="closePass" aria-label="Close" style="position:sticky;top:10px;float:right;margin:10px 12px 0 0;z-index:5;background:var(--navy);color:#fff;border:none;width:40px;height:40px;border-radius:50%;font-size:1.3rem;cursor:pointer;">✕</button>
    <div class="card-pad" id="passBody"></div>
  </div>
</div>

<!-- Games hub + game modal -->
<div id="gameOverlay" style="position:fixed;inset:0;background:rgba(20,30,45,.72);z-index:1150;display:none;align-items:center;justify-content:center;padding:14px;">
  <div id="gameCard" style="background:var(--cream);width:min(760px,100%);max-height:92vh;overflow-y:auto;border-radius:22px;border:5px solid #5fa8c9;box-shadow:0 18px 50px rgba(0,0,0,.5);">
    <button id="closeGame" aria-label="Close" style="position:sticky;top:10px;float:right;margin:10px 12px 0 0;z-index:5;background:#5fa8c9;color:#fff;border:none;width:40px;height:40px;border-radius:50%;font-size:1.3rem;cursor:pointer;">✕</button>
    <div class="card-pad" id="gameBody"></div>
  </div>
</div>

<!-- Certificate modal -->
<div id="certOverlay" style="position:fixed;inset:0;background:rgba(20,30,45,.8);z-index:1200;display:none;align-items:center;justify-content:center;padding:14px;">
  <div style="background:var(--cream);width:min(680px,100%);max-height:94vh;overflow-y:auto;border-radius:22px;border:5px solid var(--gold);box-shadow:0 18px 50px rgba(0,0,0,.5);">
    <button id="closeCert" class="noprint" aria-label="Close" style="position:sticky;top:10px;float:right;margin:10px 12px 0 0;z-index:5;background:var(--red);color:#fff;border:none;width:40px;height:40px;border-radius:50%;font-size:1.3rem;cursor:pointer;">✕</button>
    <div id="certWrap"></div>
  </div>
</div>

<script>
/* ============================================================
   DATA: 12 National Historic Site forts across Canada
   Each has real coordinates, a kid-friendly story, quick facts,
   and a pool of quiz questions (10 are drawn at random each play).
   Photos are loaded live from Wikimedia in your browser.
   ============================================================ */
const FORTS = [
{
  id:"louisbourg", name:"Fortress of Louisbourg", place:"Louisbourg, Nova Scotia", prov:"NS",
  lat:45.8917, lon:-59.9847, emoji:"⚓", wiki:"Fortress of Louisbourg",
  builtBy:"France", year:"1713", war:"French & British wars (sieges 1745 & 1758)",
  story:"Long ago, France built a huge walled town beside the cold Atlantic Ocean to protect its fishing boats and trade. Inside the tall stone walls were homes, shops, soldiers, and a busy harbour. The British attacked and captured it twice! Today it is the LARGEST rebuilt historic town in North America — actors dress up as people from the 1700s so you can see exactly how life looked.",
  quiz:[
    {q:"Which country first built the Fortress of Louisbourg?",a:["France","Spain","Italy","Norway"],c:0},
    {q:"What was Louisbourg built to protect?",a:["Fishing and trade","A gold mine","A zoo","A candy factory"],c:0},
    {q:"Louisbourg sits right beside which ocean?",a:["The Atlantic Ocean","The Pacific Ocean","The Indian Ocean","A small pond"],c:0},
    {q:"How many times did the British capture Louisbourg?",a:["Two times","Never","Ten times","Once"],c:0},
    {q:"What is special about Louisbourg today?",a:["It's the largest rebuilt historic town in North America","It's a shopping mall","It's an airport","It's a hospital"],c:0},
    {q:"Who do you meet when you visit Louisbourg today?",a:["Actors dressed as people from the 1700s","Astronauts","Race car drivers","Pirates who are real"],c:0},
    {q:"What surrounded the town of Louisbourg to keep it safe?",a:["Tall stone walls","A candy fence","A river of lava","A giant trampoline"],c:0},
    {q:"In which province is the Fortress of Louisbourg?",a:["Nova Scotia","Alberta","Ontario","Yukon"],c:0},
    {q:"Louisbourg was a very busy place for what?",a:["A harbour full of ships","Skateboarding","Video games","Snowboarding"],c:0},
    {q:"About how long ago did France start building Louisbourg (early 1700s)?",a:["Over 300 years ago","Last year","10 years ago","50 years ago"],c:0},
    {q:"Why did people build forts like Louisbourg near the water?",a:["To guard ships and the harbour","To go swimming","To catch whales for fun","To build sandcastles"],c:0},
    {q:"What jobs did people have inside Louisbourg?",a:["Soldiers, shopkeepers, and fishers","Only kings","Only clowns","Only farmers of candy"],c:0},
    {q:"What is Louisbourg protected as today?",a:["A National Historic Site of Canada","A secret base","A private house","A parking lot"],c:0}
  ]

const PROGRESS={ visited:{}, scores:{}, games:{cannon:{easy:null,medium:null,hard:null}, blitz:null} };
function recordGameBest(key,val){ if(PROGRESS.games[key]==null || val>PROGRESS.games[key]) PROGRESS.games[key]=val; }
function recordCannonBest(diff,val){ const c=PROGRESS.games.cannon; if(c[diff]==null || val>c[diff]) c[diff]=val; }
function cannonBestMax(){ const c=PROGRESS.games.cannon; return Math.max(c.easy||0,c.medium||0,c.hard||0); }
function resetAllScores(){ PROGRESS.visited={}; PROGRESS.scores={}; PROGRESS.games={cannon:{easy:null,medium:null,hard:null}, blitz:null}; updatePassportCount(); }

function medalForPct(pct){
  if(pct>=1)    return {e:"🥇",name:"Gold"};
  if(pct>=0.8)  return {e:"🥈",name:"Silver"};
  if(pct>=0.5)  return {e:"🥉",name:"Bronze"};
  if(pct>0)     return {e:"🎗️",name:"Ribbon"};
  return {e:"",name:""};
}
function levelsDone(id){ const s=PROGRESS.scores[id]; return s?['easy','medium','hard'].filter(function(k){return s[k];}).length:0; }
function fortDone(id){ return levelsDone(id)>=3; }               // all 3 quizzes finished
function completedCount(){ return FORTS.filter(function(f){return fortDone(f.id);}).length; }
function quizzesDoneTotal(){ return FORTS.reduce(function(n,f){return n+levelsDone(f.id);},0); }  // out of 36
function visitedCount(){ return Object.keys(PROGRESS.visited).length; }
function updatePassportCount(){ const el=document.getElementById('pcount'); if(el) el.textContent=completedCount(); }
function markVisited(id){ PROGRESS.visited[id]=true; updatePassportCount(); }
function recordScore(id,levelKey,score,total){
  const pct=total?score/total:0;
  if(!PROGRESS.scores[id]) PROGRESS.scores[id]={};
  const prev=PROGRESS.scores[id][levelKey];
  if(!prev || pct>prev.pct){ PROGRESS.scores[id][levelKey]={score:score,total:total,pct:pct}; }
  updatePassportCount();
}
/* Best result across all levels for a fort */
function bestTop(id){
  const s=PROGRESS.scores[id]; if(!s) return null;
  let top=null, lvl=null;
  ['easy','medium','hard'].forEach(function(k){ if(s[k] && (!top || s[k].pct>top.pct)){ top=s[k]; lvl=k; } });
  return top ? {score:top.score,total:top.total,pct:top.pct,level:lvl} : null;
}

/* Sound effects (Web Audio — no files needed) */
let _actx=null, soundOn=true;
function beep(kind){
  if(!soundOn) return;
  try{
    if(!_actx) _actx=new (window.AudioContext||window.webkitAudioContext)();
    const now=_actx.currentTime;
    const notes = kind==='good' ? [660,880] : kind==='bad' ? [200,150] : kind==='win' ? [523,659,784,1047] : [500];
    notes.forEach(function(freq,i){
      const o=_actx.createOscillator(), g=_actx.createGain();
      o.type = kind==='bad' ? 'square' : 'sine';
      o.frequency.value=freq; o.connect(g); g.connect(_actx.destination);
      const t=now+i*0.11;
      g.gain.setValueAtTime(0.0001,t);
      g.gain.exponentialRampToValueAtTime(0.16,t+0.02);
      g.gain.exponentialRampToValueAtTime(0.0001,t+0.14);
      o.start(t); o.stop(t+0.16);
    });
  }catch(e){}
}

/* Read-aloud (browser speech) */
let speaking=false;
function speak(text,btn){
  if(!('speechSynthesis' in window)){ return; }
  if(speaking){ window.speechSynthesis.cancel(); speaking=false; if(btn) btn.classList.remove('on'); return; }
  const u=new SpeechSynthesisUtterance(text);
  u.rate=0.95; u.pitch=1.05;
  u.onend=function(){ speaking=false; if(btn) btn.classList.remove('on'); };
  speaking=true; if(btn) btn.classList.add('on');
  window.speechSynthesis.speak(u);
}
function stopSpeaking(){ if('speechSynthesis' in window){ window.speechSynthesis.cancel(); } speaking=false; }

/* Wrap the first occurrence of each glossary word in a tappable span */
function glossify(text){
  const used={};
  const terms=Object.keys(GLOSSARY).sort(function(a,b){return b.length-a.length;});
  const re=new RegExp('\\b('+terms.map(function(t){return t.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');}).join('|')+')\\b','gi');
  return text.replace(re,function(m){
    const key=m.toLowerCase();
    if(used[key]||!GLOSSARY[key]) return m;
    used[key]=1;
    return '<span class="gloss" data-def="'+esc(GLOSSARY[key])+'" data-word="'+esc(m)+'">'+m+'</span>';
  });
}

  try{

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
      attribution:'&copy; OpenStreetMap contributors', maxZoom:19
    }).addTo(map);

    function makeIcon(emoji){
      return L.divIcon({
        className:'',
        html:'<div class="fort-pin"><span>'+emoji+'</span></div>',
        iconSize:[38,38], iconAnchor:[19,38], popupAnchor:[0,-36]
      });
    }
    const bounds = [];
    FORTS.forEach(function(f){
      const m = L.marker([f.lat,f.lon],{icon:makeIcon(f.emoji), title:f.name}).addTo(map);
      m.bindTooltip(f.name,{direction:'top',offset:[0,-34]});
      m.on('click',function(){ openFort(f); });
      bounds.push([f.lat,f.lon]);
    });
    map.fitBounds(bounds,{padding:[50,50]});
  }catch(err){ buildFallback(); }
}

/* Load real photos live from Wikimedia.
   Uses the API's imageinfo to get DIRECT thumbnail URLs (works whether the
   photo lives on Commons or locally on Wikipedia), so no URL guessing. */
function loadPhotos(f){
  const API='https://en.wikipedia.org/w/api.php';
  const common='?format=json&origin=*&redirects=1&action=query&titles='+encodeURIComponent(f.wiki);
  // filenames that are clearly icons / maps / flags / UI, not real photos
  const skip=/(logo|icon|flag|symbol|coat_of_arms|coat of arms|locator|_pog|pog\.|osm|edit-|_edit|wiki\.png|ambox|question_|padlock|increase|decrease|blank|speaker|sound|disambig|gnome|folder|red_x|checkmark|_map\b|\bmap_|map_of|location_map|reg_map|relief_map)/i;
  const gallery=document.getElementById('gallery');
  const banner=document.getElementById('banner');
  const note=document.getElementById('photoNote');
  if(!gallery) return;
  const seen={}; let shown=0;

  function updateNote(){
    if(note) note.innerHTML='📷 Real photos from Wikimedia Commons. <a href="https://en.wikipedia.org/wiki/'+encodeURIComponent(f.wiki)+'" target="_blank" rel="noopener">See more →</a>';
  }
  function setHero(url,fallback){
    if(!url) return;
    const bimg=new Image();
    bimg.onload=function(){ banner.innerHTML=''; banner.style.background='#0d1b2a'; bimg.style.cssText='width:100%;height:100%;object-fit:cover;'; banner.appendChild(bimg); };
    bimg.onerror=function(){ if(fallback) setHero(fallback); };
    bimg.src=url;
  }
  function addThumb(thumb, full){
    if(!thumb || seen[thumb]) return; seen[thumb]=1;
    const img=new Image();
    img.alt=f.name+' photo'; img.referrerPolicy='no-referrer';
    img.style.cursor='zoom-in';
    img.onload=function(){ gallery.appendChild(img); shown++; updateNote(); };
    img.onerror=function(){};
    img.onclick=function(){ window.open(full||thumb,'_blank'); };
    img.src=thumb;
  }

  // 1) Hero image (representative photo of the page)
  fetch(API+common+'&prop=pageimages&piprop=original|thumbnail&pithumbsize=1000')
    .then(function(r){return r.json();})
    .then(function(d){
      const pgs=d.query&&d.query.pages; if(!pgs) return;
      const pg=pgs[Object.keys(pgs)[0]]; if(!pg) return;
      setHero((pg.original&&pg.original.source), (pg.thumbnail&&pg.thumbnail.source));
    }).catch(function(){});

  // 2) Photo gallery via direct imageinfo thumbnail URLs
  fetch(API+common+'&generator=images&gimlimit=40&prop=imageinfo&iiprop=url|mime|size&iiurlwidth=500')
    .then(function(r){return r.json();})
    .then(function(d){
      const pgs=d.query&&d.query.pages; if(!pgs) return;
      Object.keys(pgs).forEach(function(k){
        const pg=pgs[k]; const t=pg.title||'';
        const ii=pg.imageinfo&&pg.imageinfo[0]; if(!ii) return;
        if(!/^image\//i.test(ii.mime||'')) return;          // images only
        if(/svg/i.test(ii.mime||'')) return;                 // no vector icons
        if(skip.test(t)) return;                             // no maps/flags/logos
        if((ii.width||0) < 320 || (ii.height||0) < 220) return; // drop tiny icons
        addThumb(ii.thumburl||ii.url, (ii.descriptionurl||ii.url));
      });
    }).catch(function(){});

  // 3) If nothing loaded (offline), show the illustration note
  setTimeout(function(){
    if(note && shown===0){
      note.innerHTML='🎨 (Showing an illustration — you need internet to see real photos.) <a href="https://en.wikipedia.org/wiki/'+encodeURIComponent(f.wiki)+'" target="_blank" rel="noopener">See photos on Wikipedia →</a>';
    }
  },4500);
}

/* ============================================================
   QUIZ ENGINE
   ============================================================ */
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }

/* Build questions from the level's own bank. Rows are [q, CORRECT, w, w, w]; all 4 choices. */
function rowToQ(row){
  const opts=[{text:row[1],correct:true},{text:row[2],correct:false},{text:row[3],correct:false},{text:row[4],correct:false}];
  return {q:row[0], opts:shuffle(opts)};
}
function buildQuestions(f, level){
  const bank=(QUIZBANKS[f.id] && QUIZBANKS[f.id][level.key]) || [];
  return shuffle(bank).slice(0, level.n).map(rowToQ);
}

function startQuiz(f, level){
  level = level || LEVELS.medium;
  const questions=buildQuestions(f, level);
  const state={i:0, score:0, streak:0, questions:questions, fort:f, level:level, timer:null};
  renderQuestion(state);
}

function clearTimer(state){ if(state.timer){ clearInterval(state.timer); state.timer=null; } }

function renderQuestion(state){
  const q=state.questions[state.i];
  const total=state.questions.length;
  const pct=Math.round((state.i)/total*100);
  const timed=state.level.timer>0;
  let html=''+
    '<div class="qhead">'+
      '<span class="qcount">Question '+(state.i+1)+' of '+total+' <span style="font-weight:normal;color:#6b7a88;">'+state.level.emoji+'</span></span>'+
      '<span class="qscore">⭐ '+state.score+'</span>'+
    '</div>'+
    '<div class="progress"><div class="bar" style="width:'+pct+'%"></div></div>'+
    (timed?'<div class="timerbar"><div class="tfill" id="tfill"></div><span class="tnum" id="tnum">'+state.level.timer+'</span></div>':'')+
    '<p class="question">'+esc(q.q)+'</p>'+
    '<div class="answers" id="answers"></div>'+
    '<div class="feedback" id="feedback"></div>'+
    '<div class="explain" id="explain"></div>'+
    '<button class="bigbtn green" id="nextBtn" style="display:none;">Next →</button>';
  cardBody.innerHTML=html;
  document.getElementById('card').scrollTop=0;
  const ansWrap=document.getElementById('answers');
  q.opts.forEach(function(opt){
    const b=document.createElement('button');
    b.className='ans'; b.textContent=opt.text;
    b.onclick=function(){ answer(state,opt,b); };
    ansWrap.appendChild(b);
  });
  if(timed){
    let left=state.level.timer;
    const fill=document.getElementById('tfill'), num=document.getElementById('tnum');
    if(fill) fill.style.width='100%';
    state.timer=setInterval(function(){
      left--; if(num) num.textContent=left>0?left:0;
      if(fill) fill.style.width=Math.max(0,left/state.level.timer*100)+'%';
      if(left<=0){ clearTimer(state); timeUp(state); }
    },1000);
  }
}

function timeUp(state){
  const buttons=document.querySelectorAll('#answers .ans');
  if(!buttons.length) return;
  buttons.forEach(function(b){ b.classList.add('locked'); b.onclick=null; });
  const q=state.questions[state.i];
  buttons.forEach(function(b){ q.opts.forEach(function(o){ if(o.correct && b.textContent===o.text) b.classList.add('correct'); }); });
  state.streak=0; beep('bad');
  const fb=document.getElementById('feedback');
  fb.textContent='⏰ Time\'s up! The correct answer is highlighted in green.';
  fb.className='feedback bad';
  showNext(state);
}

function answer(state,opt,btn){
  clearTimer(state);
  const q=state.questions[state.i];
  const buttons=document.querySelectorAll('#answers .ans');
  buttons.forEach(function(b){ b.classList.add('locked'); b.onclick=null; });
  const fb=document.getElementById('feedback');
  if(opt.correct){
    btn.classList.add('correct'); state.score++; state.streak++;
    beep(state.streak>=3?'win':'good');
    let msg=pick(['🎉 Correct! Great job!','✅ Yes! You got it!','🌟 Awesome — that\'s right!','👏 Nice work, explorer!']);
    if(state.streak>=3) msg+=' <span class="streak">🔥 '+state.streak+' in a row!</span>';
    fb.innerHTML=msg;
    fb.className='feedback good';
  }else{
    btn.classList.add('wrong'); state.streak=0;
    beep('bad');
    fb.textContent='❌ Oops! The correct answer is highlighted in green.';
    fb.className='feedback bad';
    buttons.forEach(function(b){ q.opts.forEach(function(o){ if(o.correct && b.textContent===o.text) b.classList.add('correct'); }); });
  }
  showNext(state);
}

function showNext(state){
  const nb=document.getElementById('nextBtn');
  nb.style.display='block';
  nb.textContent = (state.i+1<state.questions.length) ? 'Next Question →' : 'See My Score! 🏆';
  nb.onclick=function(){ state.i++; if(state.i<state.questions.length) renderQuestion(state); else showResults(state); };
}

function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

function showResults(state){
  clearTimer(state);
  const f=state.fort, s=state.score, total=state.questions.length;
  const lvlKey=state.level.key;
  const prevLvl=(PROGRESS.scores[f.id]||{})[lvlKey];
  recordScore(f.id,lvlKey,s,total);
  const med=medalForPct(s/total);
  const isNewBest = (prevLvl==null || (s/total)>prevLvl.pct);
  const p=s/total;
  let emoji,title,msg;
  if(p>=1){ emoji='🏆'; title='Perfect Score!'; msg='Wow! You\'re a true Fort Expert. You got every question right!'; }
  else if(p>=0.8){ emoji='🌟'; title='Amazing!'; msg='You really know your Canadian forts. Super job!'; }
  else if(p>=0.5){ emoji='😃'; title='Well Done!'; msg='Great effort! Try again to beat your score.'; }
  else{ emoji='🙂'; title='Good Try!'; msg='Every explorer keeps learning. Read the story again and give it another go!'; }

  const medalLine = med.e ? '<p class="result-msg" style="margin-bottom:8px;">You earned a <b>'+med.name+' medal</b> '+med.e+' on '+state.level.label+' for '+esc(f.name)+'!'+(isNewBest&&prevLvl!=null?' 🎉 New best!':'')+'</p>' : '';
  const allDone = completedCount()>=FORTS.length;
  const certBtn = allDone ? '<button class="bigbtn green" id="getCert">🏅 Get your Explorer Certificate!</button>' : '';

  cardBody.innerHTML=''+
    '<div class="result-emoji">'+emoji+'</div>'+
    '<h2 class="result-title">'+title+'</h2>'+
    badgeSVG(s,total)+
    '<p class="result-score">You scored <b>'+s+' out of '+total+'</b> at<br>'+esc(f.name)+'!</p>'+
    medalLine+
    '<p class="result-msg">'+msg+'</p>'+
    certBtn+
    '<div class="btnrow">'+
      '<button class="bigbtn green" id="again">🔁 Play Again ('+state.level.emoji+')</button>'+
      '<button class="bigbtn" id="changeLvl" style="background:#8ecae6;box-shadow:0 4px 0 #5fa8c9;color:var(--navy);">🎚️ Pick Another Level</button>'+
    '</div>'+
    '<div class="btnrow" style="margin-top:8px;">'+
      '<button class="bigbtn navy" id="backMap">🗺️ Back to Map</button>'+
      '<button class="bigbtn" id="openPassport2" style="background:#e9d9b6;box-shadow:0 4px 0 #c3b48f;">🎒 My Passport</button>'+
    '</div>';
  document.getElementById('card').scrollTop=0;
  document.getElementById('again').onclick=function(){ startQuiz(f, state.level); };
  document.getElementById('changeLvl').onclick=function(){ openFort(f); };
  document.getElementById('backMap').onclick=closeCard;
  document.getElementById('openPassport2').onclick=function(){ openPassport(); };
  if(certBtn) document.getElementById('getCert').onclick=function(){ openCertificate(); };

  if(p>=0.8){ beep('win'); confetti(); } else { beep('good'); }
}

/* little confetti burst */
function confetti(){
  const colors=['#f2b035','#d64545','#2f9e6f','#2c5a86','#ffffff'];
  for(let i=0;i<60;i++){
    const d=document.createElement('div');
    d.style.cssText='position:fixed;top:-10px;left:'+Math.random()*100+'vw;width:10px;height:14px;'+
      'background:'+colors[i%colors.length]+';z-index:2000;border-radius:2px;pointer-events:none;'+
      'transform:rotate('+Math.random()*360+'deg);';
    document.body.appendChild(d);
    const fall=1200+Math.random()*1500, drift=(Math.random()-0.5)*200;
    d.animate([{transform:d.style.transform+' translate(0,0)',opacity:1},
               {transform:'translate('+drift+'px,110vh) rotate(720deg)',opacity:0.9}],
              {duration:fall,easing:'ease-in'});
    setTimeout(function(){d.remove();},fall);
  }
}

/* ---------- Timeline Challenge (drag-and-drop + tap) ---------- */
function timelineGame(){
  const picks=shuffle(FORTS).slice(0,5);
  const order=[null,null,null,null,null];
  openGame();
  function placed(){ return order.filter(Boolean).length; }
  function firstEmpty(){ for(let i=0;i<5;i++) if(!order[i]) return i; return -1; }
  function payloadFor(f,from,slot){ return JSON.stringify({id:f.id,from:from,slot:(slot==null?-1:slot)}); }
  function drop(i,data){
    const f=picks.find(function(x){return x.id===data.id;}); if(!f) return;
    if(data.from==='slot'){ const src=data.slot; const tmp=order[i]; order[i]=f; order[src]=tmp; }
    else { order[i]=f; }
    beep('good'); render();
  }
  function render(){
    let slots='';
    for(let i=0;i<5;i++){
      const f=order[i];
      slots+='<div class="tl-slot '+(f?'filled':'')+'" data-slot="'+i+'"'+(f?' draggable="true"':'')+'>'+
        '<span class="num">'+(i+1)+'</span>'+
        (f?('<div class="tl-emoji">'+f.emoji+'</div><div class="tl-name">'+esc(f.name)+'</div>')
           :'<span style="color:#8a99a7;font-size:.7rem;">drop or<br>tap here</span>')+
      '</div>';
    }
    const remaining=picks.filter(function(p){return order.indexOf(p)<0;});
    const tray=remaining.map(function(f){
      return '<div class="tl-card" data-id="'+f.id+'" draggable="true"><div class="tl-emoji">'+f.emoji+'</div><div class="tl-name">'+esc(f.name)+'</div></div>';
    }).join('');
    gameBody.innerHTML=
      '<h2 class="fort-title">⏳ Timeline Challenge</h2>'+
      '<p class="fort-loc" style="color:#42586b;"><b>Drag</b> the forts (or tap them) into order from the <b>oldest</b> to the <b>newest</b>. Tap a placed fort to send it back.</p>'+
      '<div class="arrowline"><span>⬅️ Oldest (built first)</span><span>Newest ➡️</span></div>'+
      '<div class="tl-slots">'+slots+'</div>'+
      '<div class="tl-tray">'+(tray||'<span style="color:#42586b;font-weight:bold;">All placed — check your order!</span>')+'</div>'+
      '<button class="bigbtn '+(placed()===5?'green':'')+'" id="tlCheck"'+(placed()<5?' disabled style="opacity:.5;"':'')+'>✅ Check my order!</button>'+
      '<div class="btnrow" style="margin-top:10px;"><button class="bigbtn navy" id="tlNew">🔄 New Forts</button><button class="bigbtn" id="tlHub" style="background:#e9d9b6;box-shadow:0 4px 0 #c3b48f;">🎮 Games Menu</button></div>';
    // tray cards: tap to place, drag to place
    gameBody.querySelectorAll('.tl-card').forEach(function(c){
      const f=picks.find(function(x){return x.id===c.getAttribute('data-id');});
      c.onclick=function(){ const e=firstEmpty(); if(e>=0){ order[e]=f; beep('good'); render(); } };
      c.addEventListener('dragstart',function(ev){ ev.dataTransfer.setData('text/plain',payloadFor(f,'tray',null)); ev.dataTransfer.effectAllowed='move'; });
    });
    // slots: tap filled to remove; drop target; filled draggable to swap
    gameBody.querySelectorAll('.tl-slot').forEach(function(s){
      const idx=+s.getAttribute('data-slot');
      if(s.classList.contains('filled')){
        s.onclick=function(){ order[idx]=null; render(); };
        s.addEventListener('dragstart',function(ev){ ev.dataTransfer.setData('text/plain',payloadFor(order[idx],'slot',idx)); ev.dataTransfer.effectAllowed='move'; });
      }
      s.addEventListener('dragover',function(ev){ ev.preventDefault(); s.style.background='#fff7e3'; });
      s.addEventListener('dragleave',function(){ s.style.background=''; });
      s.addEventListener('drop',function(ev){ ev.preventDefault(); s.style.background=''; try{ drop(idx, JSON.parse(ev.dataTransfer.getData('text/plain'))); }catch(e){} });
    });
    const chk=document.getElementById('tlCheck'); if(chk && placed()===5) chk.onclick=check;
    document.getElementById('tlNew').onclick=timelineGame;
    document.getElementById('tlHub').onclick=openGamesHub;
  }
  function check(){
    const correct=picks.slice().sort(function(a,b){return BUILT[a.id]-BUILT[b.id];});
    let right=0, slots='';
    for(let i=0;i<5;i++){
      const f=order[i]; const ok=f && f.id===correct[i].id; if(ok) right++;
      slots+='<div class="tl-slot filled '+(ok?'right':'wrong')+'">'+
        '<span class="num">'+(i+1)+'</span>'+
        '<div class="tl-emoji">'+f.emoji+'</div><div class="tl-name">'+esc(f.name)+'</div>'+
        '<div class="tl-year">'+BUILT[f.id]+'</div><div>'+(ok?'✅':'❌')+'</div>'+
      '</div>';
    }
    const perfect=right===5; beep(perfect?'win':'good'); if(perfect) confetti();
    const list=correct.map(function(f){
      return '<div style="margin:4px 0;"><b>'+BUILT[f.id]+'</b> — '+f.emoji+' '+esc(f.name)+
        '<div style="font-size:.82rem;color:#42586b;margin-left:6px;">🏳️ '+esc(f.war)+'</div></div>';
    }).join('');
    gameBody.innerHTML=
      '<h2 class="fort-title">⏳ Timeline Results</h2>'+
      '<div class="arrowline"><span>⬅️ Oldest</span><span>Newest ➡️</span></div>'+
      '<div class="tl-slots">'+slots+'</div>'+
      '<p class="result-msg" style="text-align:left;">You placed <b>'+right+' of 5</b> in the right spot! '+(perfect?'🏆 Perfect timeline!':'Play again to beat your score.')+'</p>'+
      '<div class="factcard" style="text-align:left;">📜 <b>The real order — and what each fort is famous for:</b>'+list+'</div>'+

function cannonPlay(diff){
  openGame();
  const myToken=++arcadeToken;
  const W=680, H=360;
  gameBody.innerHTML=
    '<h2 class="fort-title">🎯 Cannon Blast <span style="font-size:1rem;color:#6b7a88;">'+diff.label+'</span></h2>'+
    '<div style="display:flex;justify-content:space-between;font-weight:bold;color:var(--navy);margin-bottom:6px;font-size:.95rem;">'+
      '<span>⭐ Score: <b id="aScore">0</b></span><span>Lives: <span id="aLives"></span></span><span>⏱️ <b id="aTime">'+diff.time+'</b>s</span></div>'+
    '<canvas id="cvs" width="'+W+'" height="'+H+'" style="width:100%;border-radius:14px;border:3px solid var(--navy);touch-action:none;cursor:crosshair;display:block;"></canvas>'+
    '<div id="aFact" style="min-height:20px;margin-top:8px;font-size:.9rem;color:#b5820f;font-weight:bold;text-align:center;"></div>'+
    '<div class="btnrow" style="margin-top:8px;"><button class="bigbtn navy" id="aHub">🎮 Games Menu</button></div>';
  document.getElementById('aHub').onclick=function(){ arcadeToken++; cannonGame(); };
  const cvs=document.getElementById('cvs'), ctx=cvs.getContext('2d');
  const aScore=document.getElementById('aScore'), aLives=document.getElementById('aLives'), aTime=document.getElementById('aTime'), aFact=document.getElementById('aFact');
  const pivot={x:54,y:H-30};
  let aim={x:W*0.6,y:H*0.35};
  let ships=[], balls=[], parts=[];
  let score=0, lives=diff.lives, time=diff.time, done=false;
  let spawnT=0, spawnGap=diff.spawn, cool=0, last=null, factT=0;

  function toC(e){ const r=cvs.getBoundingClientRect(); return {x:(e.clientX-r.left)*(cvs.width/r.width), y:(e.clientY-r.top)*(cvs.height/r.height)}; }
  cvs.addEventListener('pointermove',function(e){ aim=toC(e); });
  cvs.addEventListener('pointerdown',function(e){ aim=toC(e); fire(); });

  function fire(){
    if(done||cool>0) return; cool=0.25;
    const dx=aim.x-pivot.x, dy=aim.y-pivot.y, d=Math.hypot(dx,dy)||1, sp=470;
    balls.push({x:pivot.x+dx/d*32, y:pivot.y+dy/d*32, vx:dx/d*sp, vy:dy/d*sp, life:1.8});
    beep('good');
  }
  function spawnShip(){
    const y=36+Math.random()*(H-110);
    const speed=diff.base+Math.random()*40+ (diff.time-time)*0.7;
    ships.push({x:W+30, y:y, vx:-speed, r:diff.r, fort:pick(FORTS)});
  }
  function boom(x,y){ for(let i=0;i<8;i++){ const a=Math.random()*6.28, s=40+Math.random()*80; parts.push({x:x,y:y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:0.5,e:pick(['💥','✨','⭐'])}); } }
  function showFact(f){ if(factT>0) return; factT=2.6; const fa=FACTS[f.id]?pick(FACTS[f.id]):''; if(aFact) aFact.textContent=f.emoji+' '+f.name+' — '+fa; }

  function update(dt){
    time-=dt; if(time<=0){ time=0; end(); return; }
    cool=Math.max(0,cool-dt); factT=Math.max(0,factT-dt); if(factT<=0 && aFact && aFact.textContent) aFact.textContent='';
    spawnT+=dt; if(spawnT>=spawnGap){ spawnT=0; spawnGap=Math.max(0.5,spawnGap-diff.ramp); spawnShip(); }
    for(let i=ships.length-1;i>=0;i--){ const s=ships[i]; s.x+=s.vx*dt;
      if(s.x<pivot.x+8){ ships.splice(i,1); lives--; beep('bad'); if(lives<=0){ end(); return; } }
    }
    for(let i=balls.length-1;i>=0;i--){ const b=balls[i]; b.x+=b.vx*dt; b.y+=b.vy*dt; b.life-=dt;
      if(b.life<=0||b.x<-10||b.x>W+10||b.y<-10||b.y>H+10){ balls.splice(i,1); continue; }
      for(let j=ships.length-1;j>=0;j--){ const s=ships[j];
        if(Math.hypot(b.x-s.x,b.y-s.y)<s.r+6){ boom(s.x,s.y); showFact(s.fort); ships.splice(j,1); balls.splice(i,1); score+=10; beep('win'); break; }
      }
    }
    for(let i=parts.length-1;i>=0;i--){ const p=parts[i]; p.x+=p.vx*dt; p.y+=p.vy*dt; p.life-=dt; if(p.life<=0) parts.splice(i,1); }
    if(aScore) aScore.textContent=score;
    if(aTime) aTime.textContent=Math.ceil(time);
    if(aLives) aLives.textContent=lives>0?'🚩'.repeat(lives):'—';
  }
  function draw(){
    const g=ctx.createLinearGradient(0,0,0,H); g.addColorStop(0,'#bfe6f5'); g.addColorStop(0.58,'#a7d8ef'); g.addColorStop(0.58,'#6bb0d8'); g.addColorStop(1,'#3f83b3');
    ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.font='34px serif'; ctx.fillText('🏰',28,H-28);
    const ang=Math.atan2(aim.y-pivot.y, aim.x-pivot.x);
    ctx.save(); ctx.translate(pivot.x,pivot.y); ctx.rotate(ang); ctx.fillStyle='#2b2b2b'; ctx.fillRect(0,-6,42,12); ctx.restore();
    ctx.beginPath(); ctx.arc(pivot.x,pivot.y,13,0,7); ctx.fillStyle='#444'; ctx.fill();
    const shipFont=Math.round(diff.r*1.6);
    ctx.font=shipFont+'px serif'; ships.forEach(function(s){ ctx.fillText('🚢',s.x,s.y); });
    ctx.fillStyle='#1a1a1a'; balls.forEach(function(b){ ctx.beginPath(); ctx.arc(b.x,b.y,6,0,7); ctx.fill(); });
    parts.forEach(function(p){ ctx.globalAlpha=Math.max(0,p.life*2); ctx.font='18px serif'; ctx.fillText(p.e,p.x,p.y); ctx.globalAlpha=1; });
    ctx.strokeStyle='rgba(214,69,69,.7)'; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(aim.x,aim.y,9,0,7); ctx.stroke();
  }
  function frame(ts){
    if(myToken!==arcadeToken || gameOverlay.style.display==='none') return;
    if(last==null) last=ts; let dt=(ts-last)/1000; last=ts; if(dt>0.05) dt=0.05;
    update(dt); if(done) return; draw(); requestAnimationFrame(frame);
  }
  function end(){
    if(done) return; done=true;
    const prevBest=PROGRESS.games.cannon[diff.key]; recordCannonBest(diff.key,score);
    const isBest=(prevBest==null||score>prevBest);
    const great=score>=100, good=score>=50;
    beep(great?'win':'good'); if(great) confetti();
    gameBody.innerHTML='<div class="result-emoji">'+(great?'🏆':good?'🎯':'💪')+'</div>'+
      '<h2 class="result-title">Time\'s Up!</h2>'+
      '<p class="result-score">You blasted ships for <b>'+score+' points</b> on '+diff.label+'!'+(isBest&&prevBest!=null?' 🎉 New best!':'')+'</p>'+
      '<p class="result-msg" style="margin-bottom:6px;">🏅 Your best on '+diff.label+': <b>'+PROGRESS.games.cannon[diff.key]+'</b> points</p>'+
      '<p class="result-msg">'+(great?'Master gunner! Incredible aim! 🎉':good?'Great shooting, defender!':'Good effort — try again to beat your score!')+'</p>'+
      '<div class="btnrow"><button class="bigbtn green" id="aAgain">🔁 Play Again ('+diff.label+')</button><button class="bigbtn" id="aLevel" style="background:#8ecae6;box-shadow:0 4px 0 #5fa8c9;color:var(--navy);">🎚️ Change Difficulty</button><button class="bigbtn navy" id="aHub2">🎮 Menu</button></div>';
    document.getElementById('aAgain').onclick=function(){ cannonPlay(diff); };
    document.getElementById('aLevel').onclick=cannonGame;
    document.getElementById('aHub2').onclick=openGamesHub;
  }
  requestAnimationFrame(frame);
}

/* ---------- Fort Quiz Blitz: mixed questions from all forts ---------- */
function blitzGame(){
  openGame();
  const pool=[];
  FORTS.forEach(function(f){ ['easy','medium','hard'].forEach(function(k){ (QUIZBANKS[f.id][k]||[]).forEach(function(r){ pool.push({row:r,fort:f}); }); }); });
  const qs=shuffle(pool).slice(0,10);
  let i=0, score=0, streak=0, t=null;
  function clearT(){ if(t){ clearInterval(t); t=null; } }
  function lock(){ document.querySelectorAll('#bans .ans').forEach(function(b){ b.classList.add('locked'); b.onclick=null; }); }
  function reveal(q){ document.querySelectorAll('#bans .ans').forEach(function(b){ q.opts.forEach(function(o){ if(o.correct && b.textContent===o.text) b.classList.add('correct'); }); }); }
  function render(){
    const item=qs[i], q=rowToQ(item.row), total=qs.length;
    gameBody.innerHTML=
      '<h2 class="fort-title">🧠 Fort Quiz Blitz</h2>'+
      '<div class="qhead"><span class="qcount">Question '+(i+1)+' of '+total+'</span><span class="qscore">⭐ '+score+'</span></div>'+
      '<div class="progress"><div class="bar" style="width:'+Math.round(i/total*100)+'%"></div></div>'+
      '<div class="timerbar"><div class="tfill" id="btf"></div><span class="tnum" id="btn">10</span></div>'+
      '<p style="text-align:center;font-size:.85rem;color:#42586b;margin:0 0 2px;">This one is about: '+item.fort.emoji+' <b>'+esc(item.fort.name)+'</b></p>'+
      '<p class="question">'+esc(q.q)+'</p>'+
      '<div class="answers" id="bans"></div>'+
      '<div class="feedback" id="bfb"></div>'+
      '<button class="bigbtn green" id="bnext" style="display:none;">Next →</button>'+
      '<button class="bigbtn navy" id="bMenu" style="margin-top:10px;">🎮 Games Menu</button>';
    const wrap=document.getElementById('bans');
    q.opts.forEach(function(o){ const b=document.createElement('button'); b.className='ans'; b.textContent=o.text; b.onclick=function(){ answer(o,b,q); }; wrap.appendChild(b); });
    document.getElementById('bMenu').onclick=function(){ clearT(); openGamesHub(); };
    let left=10; const fill=document.getElementById('btf'), num=document.getElementById('btn'); if(fill) fill.style.width='100%';
    t=setInterval(function(){
      if(gameOverlay.style.display==='none'){ clearT(); return; }
      left--; if(num) num.textContent=left>0?left:0; if(fill) fill.style.width=Math.max(0,left*10)+'%';
      if(left<=0){ clearT(); lock(); streak=0; beep('bad'); reveal(q); const fb=document.getElementById('bfb'); if(fb){ fb.textContent='⏰ Time\'s up!'; fb.className='feedback bad'; } showNextB(); }
    },1000);
  }
  function answer(o,btn,q){
    clearT(); lock(); const fb=document.getElementById('bfb');
    if(o.correct){ btn.classList.add('correct'); score++; streak++; beep(streak>=3?'win':'good'); fb.innerHTML='✅ Correct!'+(streak>=3?' <span class="streak">🔥 '+streak+'!</span>':''); fb.className='feedback good'; }
    else{ btn.classList.add('wrong'); streak=0; beep('bad'); reveal(q); fb.textContent='❌ The green one was right.'; fb.className='feedback bad'; }
    showNextB();
  }
  function showNextB(){
    const nb=document.getElementById('bnext'); if(!nb) return;
    nb.style.display='block'; nb.textContent=(i+1<qs.length)?'Next →':'See My Score! 🏆';
    nb.onclick=function(){ i++; if(i<qs.length) render(); else results(); };
  }
  function results(){
    clearT(); const total=qs.length, p=score/total;
    const prevBest=PROGRESS.games.blitz; recordGameBest('blitz',score);
    const isBest=(prevBest==null||score>prevBest);
    beep(p>=0.8?'win':'good'); if(p>=0.8) confetti();
    gameBody.innerHTML='<div class="result-emoji">'+(p>=0.8?'🏆':p>=0.5?'😃':'🙂')+'</div>'+
      '<h2 class="result-title">Quiz Blitz Done!</h2>'+
      '<p class="result-score">You scored <b>'+score+' / '+total+'</b> across all the forts!'+(isBest&&prevBest!=null?' 🎉 New best!':'')+'</p>'+
      '<p class="result-msg" style="margin-bottom:6px;">🏅 Your best: <b>'+PROGRESS.games.blitz+' / '+total+'</b></p>'+
      '<p class="result-msg">'+(p>=0.8?'Wow — a true Fort Expert! 🎉':p>=0.5?'Great job! Play again to beat your score.':'Keep exploring the forts and try again!')+'</p>'+
      '<div class="btnrow"><button class="bigbtn green" id="bAgain">🔁 Play Again</button><button class="bigbtn navy" id="bHub">🎮 Games Menu</button></div>';
    document.getElementById('bAgain').onclick=blitzGame;
    document.getElementById('bHub').onclick=openGamesHub;
  }
  render();
}

    case 7: return '<circle cx="120" cy="150" r="15" fill="none" stroke="#a06a30" stroke-width="4"/>';
    case 8: return '<g transform="translate(116,150)"><path d="M0 -11 L9 -1 L0 13 L-9 -1 Z" fill="#c0392b"/><rect x="-1.5" y="-17" width="3" height="8" fill="#5a3a1c"/></g>';
    case 9: return '<text x="122" y="152" font-size="24" text-anchor="middle">🧶</text>';
  }
  return '';
}
function duSVG(head,body,hand,fig){
  fig=fig||'man';
  let s='';
  s+=duLegs(body); s+=duCoat(body);
  s+='<rect x="73" y="70" width="14" height="14" fill="'+DU_SKIN+'"/>';
  s+='<circle cx="80" cy="54" r="23" fill="'+DU_SKIN+'"/>';
  if(fig==='woman'){
    s+='<path d="M57 42 Q56 84 66 92 L71 74 Q65 58 68 48 Z" fill="#5a3a22"/>';
    s+='<path d="M103 42 Q104 84 94 92 L89 74 Q95 58 92 48 Z" fill="#5a3a22"/>';
  }
  s+='<path d="M59 52 Q60 31 80 31 Q100 31 101 52 Q90 44 80 44 Q70 44 59 52 Z" fill="#5a3a22"/>';
  s+='<circle cx="72" cy="55" r="2.6" fill="#33260f"/><circle cx="88" cy="55" r="2.6" fill="#33260f"/>';
  s+='<path d="M72 63 Q80 70 88 63" stroke="#b05a3e" stroke-width="2.6" fill="none" stroke-linecap="round"/>';
  if(head!=null) s+=duHat(head);
  if(hand!=null) s+=duProp(hand);
  if(fig==='child') s='<g transform="translate(17,42) scale(0.78)">'+s+'</g>';
  return '<svg viewBox="0 0 160 205" width="150" height="192" style="max-width:100%;">'+s+'</svg>';
}
function duIcon(cat,i){
  if(cat==='head') return '<svg viewBox="38 0 84 82" width="44" height="42"><circle cx="80" cy="54" r="23" fill="'+DU_SKIN+'"/>'+duHat(i)+'</svg>';
  if(cat==='body') return '<svg viewBox="40 76 80 84" width="44" height="46">'+duLegs(i)+duCoat(i)+'</svg>';
  return '<svg viewBox="86 116 74 76" width="42" height="42">'+duProp(i)+'</svg>';
}
function dressChooser(){
  openGame();
  const cards=FORTS.map(function(f){
    return '<button class="tl-card" data-id="'+f.id+'" style="width:108px;border-color:var(--navy);"><div class="tl-emoji">'+f.emoji+'</div><div class="tl-name">'+esc(f.name)+'</div></button>';
  }).join('');
  gameBody.innerHTML='<h2 class="fort-title">👗 Dress-Up Time Traveler</h2>'+
    '<p class="fort-loc" style="color:#42586b;">Which fort\'s people would you like to dress? Pick a fort!</p>'+
    '<div class="tl-tray">'+cards+'</div>'+
    '<button class="bigbtn navy" id="duBackHub">🎮 Games Menu</button>';
  gameBody.querySelectorAll('.tl-card').forEach(function(c){ c.onclick=function(){ dressPersonPicker(FORTS.find(function(x){return x.id===c.getAttribute('data-id');})); }; });
  document.getElementById('duBackHub').onclick=openGamesHub;
}
/* Step 2: pick which person (man / woman / child) to dress */
function dressPersonPicker(f){
  const chars=charsFor(f.id);
  const cards=chars.map(function(c,idx){
    return '<button class="du-person" data-idx="'+idx+'">'+
      '<div style="height:120px;display:flex;align-items:flex-end;justify-content:center;">'+duSVG(null,null,null,c.fig)+'</div>'+
      '<div style="font-weight:bold;color:var(--navy);margin-top:4px;">'+esc(c.who)+'</div>'+
      '<div style="font-size:.75rem;color:#6b7a88;">'+(c.fig==='man'?'👨 grown man':c.fig==='woman'?'👩 grown woman':'🧒 child')+'</div>'+
    '</button>';
  }).join('');
  gameBody.innerHTML='<h2 class="fort-title">👗 Dress-Up: '+esc(f.name)+'</h2>'+
    '<p class="fort-loc" style="color:#42586b;">Who would you like to dress? Each person wore different clothes!</p>'+
    '<div class="du-people">'+cards+'</div>'+
    '<p style="font-size:.8rem;color:#6b7a88;">💡 Read "A Day in the Life" on a fort to learn what each person wore.</p>'+
    '<div class="btnrow"><button class="bigbtn navy" id="duPickFort">🔄 Another Fort</button><button class="bigbtn" id="duPHub" style="background:#e9d9b6;box-shadow:0 4px 0 #c3b48f;">🎮 Games Menu</button></div>';
  gameBody.querySelectorAll('.du-person').forEach(function(b){ b.onclick=function(){ dressBuild(f, chars[+b.getAttribute('data-idx')]); }; });
  document.getElementById('duPickFort').onclick=dressChooser;
  document.getElementById('duPHub').onclick=openGamesHub;
}
/* Step 3: dress the chosen person */
function dressBuild(f, target){
  const sel={head:null,body:null,hand:null};
  const pool=DU_POOL[target.fig]||DU_POOL.man;
  // show options appropriate to this person, in a shuffled order (so the answer isn't obvious)
  const shown={head:shuffle(pool.head), body:shuffle(pool.body), hand:shuffle(pool.hand)};
  function ready(){ return sel.head!=null&&sel.body!=null&&sel.hand!=null; }
  function cat(key,label){
    const opts=shown[key].map(function(idx){
      const o=DRESS_OPTS[key][idx];
      return '<button class="du-opt '+(sel[key]===idx?'sel':'')+'" data-cat="'+key+'" data-idx="'+idx+'"><span class="oe">'+duIcon(key,idx)+'</span>'+esc(o.label)+'</button>';
    }).join('');
    return '<div class="du-cat"><h4>'+label+':</h4><div class="du-opts">'+opts+'</div></div>';
  }
  function render(){
    gameBody.innerHTML=
      '<h2 class="fort-title">👗 Dress the '+esc(target.who)+'</h2>'+
      '<p class="fort-loc">from '+esc(f.name)+' — choose the right hat, clothes, and item!</p>'+
      '<div class="du-wrap"><div class="du-char">'+duSVG(sel.head,sel.body,sel.hand,target.fig)+'</div>'+
      '<div class="du-controls">'+cat('head','Hat / Head')+cat('body','Clothes')+cat('hand','Item')+'</div></div>'+
      '<button class="bigbtn '+(ready()?'green':'')+'" id="duCheck"'+(ready()?'':' disabled style="opacity:.5;"')+'>✅ Check my outfit!</button>'+
      '<div class="btnrow" style="margin-top:10px;"><button class="bigbtn navy" id="duBack">🔄 Another Person</button><button class="bigbtn" id="duHub" style="background:#e9d9b6;box-shadow:0 4px 0 #c3b48f;">🎮 Games Menu</button></div>';
    gameBody.querySelectorAll('.du-opt').forEach(function(b){ b.onclick=function(){ sel[b.getAttribute('data-cat')]=+b.getAttribute('data-idx'); beep('good'); render(); }; });
    document.getElementById('duBack').onclick=function(){ dressPersonPicker(f); };
    document.getElementById('duHub').onclick=openGamesHub;
    const c=document.getElementById('duCheck'); if(c && ready()) c.onclick=check;
  }
  function mark(ok){ return ok?'<span style="color:#2f9e6f;">✔</span>':'<span style="color:#d64545;">✘</span>'; }
  function check(){
    const rh=sel.head===target.head, rb=sel.body===target.body, rn=sel.hand===target.hand;
    const n=(rh?1:0)+(rb?1:0)+(rn?1:0);
    beep(n===3?'win':'good'); if(n===3) confetti();
    gameBody.innerHTML=
      '<h2 class="fort-title">👗 '+(n===3?'Perfect Outfit! 🎉':'Good try!')+'</h2>'+
      '<p class="fort-loc">You got <b>'+n+' of 3</b> right for the '+esc(target.who)+'.</p>'+
      '<div class="du-compare">'+
        '<div class="du-col"><div class="du-collabel">👕 Your outfit</div><div class="du-char">'+duSVG(sel.head,sel.body,sel.hand,target.fig)+'</div></div>'+
        '<div class="du-col"><div class="du-collabel" style="color:#2f9e6f;">✅ The real outfit</div><div class="du-char" style="border-color:#2f9e6f;">'+duSVG(target.head,target.body,target.hand,target.fig)+'</div></div>'+
      '</div>'+
      '<div class="factcard" style="text-align:left;">'+
        mark(rh)+' <b>Hat:</b> you picked <i>'+esc(DRESS_OPTS.head[sel.head].label)+'</i>'+(rh?'':' — real: <b>'+esc(DRESS_OPTS.head[target.head].label)+'</b>')+'<br>'+
        mark(rb)+' <b>Clothes:</b> you picked <i>'+esc(DRESS_OPTS.body[sel.body].label)+'</i>'+(rb?'':' — real: <b>'+esc(DRESS_OPTS.body[target.body].label)+'</b>')+'<br>'+
        mark(rn)+' <b>Item:</b> you picked <i>'+esc(DRESS_OPTS.hand[sel.hand].label)+'</i>'+(rn?'':' — real: <b>'+esc(DRESS_OPTS.hand[target.hand].label)+'</b>')+
      '</div>'+
      '<div class="story">'+esc(target.fact)+'</div>'+
      '<div class="btnrow"><button class="bigbtn green" id="duRetry">🔄 Try Again</button><button class="bigbtn" id="duAnother" style="background:#8ecae6;box-shadow:0 4px 0 #5fa8c9;color:var(--navy);">👥 Another Person</button><button class="bigbtn navy" id="duHub2">🎮 Menu</button></div>';
    document.getElementById('duRetry').onclick=function(){ dressBuild(f,target); };
    document.getElementById('duAnother').onclick=function(){ dressPersonPicker(f); };
    document.getElementById('duHub2').onclick=openGamesHub;
  }
  render();
}
</script>
</body>
</html>
